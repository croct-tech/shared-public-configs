name: Publish Public NPM Package

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "24"
      registry-url:
        type: string
        default: "https://registry.npmjs.org"
      build-dir:
        type: string
        default: "build"
      prepare-script:
        type: string
        required: true
      build-script:
        type: string
        default: "build"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Build package
        run: npm run ${{ inputs.build-script }}

      - name: Prepare release
        run: ${{ inputs.prepare-script }}

      - name: Publish pre-release
        if: ${{ github.event.release.prerelease }}
        run: |
          cd ${{ inputs.build-dir }}
          npm publish --access public --tag next --provenance

      - name: Publish release
        if: ${{ !github.event.release.prerelease }}
        run: |
          cd ${{ inputs.build-dir }}
          npm publish --access public --provenance