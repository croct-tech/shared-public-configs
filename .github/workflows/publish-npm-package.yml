name: Publish NPM package

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "24"
      registry-url:
        type: string
        default: "https://registry.npmjs.org"
      build-dir:
        type: string
        default: "build"
      prepare-script:
        type: string
        required: true
      publish-access:
        type: string
        default: "restricted"
      build-script:
        type: string
        default: "build"
    secrets:
      NPM_TOKEN:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.registry-url }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Cache dependencies
        id: cache-dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ hashFiles('**/package-lock.json', '**/package.json') }}

      - name: Install dependencies
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: |
          npm ci
          rm -rf ~/.npmrc

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Build package
        run: npm run ${{ inputs.build-script }}

      - name: Prepare release
        run: ${{ inputs.prepare-script }}

      - name: Publish pre-release
        if: ${{ github.event.release.prerelease }}
        run: |
          cd ${{ inputs.build-dir }}
          npm publish --access ${{ inputs.publish-access }} --tag next --provenance

      - name: Publish release
        if: ${{ !github.event.release.prerelease }}
        run: |
          cd ${{ inputs.build-dir }}
          npm publish --access ${{ inputs.publish-access }} --provenance
